name: CI

# Verifies the project compiles and passes tests on every push and pull request to main.
# Does not package or publish — that's the Release workflow's job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check main process
        run: npm run build:main

      - name: Build renderer
        run: npm run build:renderer

      - name: Renderer smoke tests
        run: npm run test

      - name: Package (unpacked, smoke check)
        run: npx electron-builder --win --dir

  integration:
    runs-on: ubuntu-latest
    needs: build
    environment: pve-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests against live Proxmox
        env:
          PVE_TEST_HOST: ${{ secrets.PVE_TEST_HOST }}
          PVE_TEST_TOKEN: ${{ secrets.PVE_TEST_TOKEN }}
        run: npm run test:integration

  e2e:
    name: E2E launch (Playwright Electron)
    runs-on: windows-latest
    needs: build
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Build application
        run: npm run build

      - name: Run E2E launch test
        run: npm run test:e2e
