name: CI

# Verifies the project compiles on every push and pull request to main.
# Does not package or publish — that's the Release workflow's job.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check main process
        run: npm run build:main

      - name: Build renderer
        run: npm run build:renderer

      - name: Package (unpacked, smoke check)
        run: npx electron-builder --win --dir
