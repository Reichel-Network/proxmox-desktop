name: Release

# Builds the Windows installer and publishes a GitHub Release whenever a
# version tag (e.g. v1.2.0) is pushed. electron-builder uploads the NSIS
# installer, latest.yml, and the blockmap so the in-app auto-updater works.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)build and publish (e.g. v1.1.0)'
        required: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Build and publish Windows installer
        run: npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
